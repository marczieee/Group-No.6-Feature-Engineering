name: Group 6 - Feature Engineering CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  feature-engineering-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set Up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: 📁 Create Required Folders
        run: |
          mkdir -p input
          mkdir -p output
          mkdir -p tests

      - name: ⚙️ Run Feature Engineering Pipeline
        run: |
          python main.py

      - name: 🧪 Run PyTest Tests
        run: |
          pytest tests/test_functions.py -v --tb=long

      - name: 💾 Commit and Force Push Output Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch the latest state of the remote main branch
          git fetch origin main
          
          # Completely reset our local branch to match remote main, discarding any local state
          git reset --hard origin/main
          
          # Add a unique timestamp to guarantee a change and force an update
          echo "This file ensures an update. Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > output/.github_actions_trigger
          
          # Add all changes in the output folder
          git add output/
          
          # Commit the changes. If nothing changed, this will fail silently, which is fine.
          git commit -m "CI: Auto-update output files - $(date -u +'%Y-%m-%d %H:%M:%S') [skip ci]" || echo "No changes to commit."
          
          # Force push the changes to the remote main branch.
          # This overwrites the remote branch with our local state, which is safe because the output/ folder is generated.
          git push --force origin main