name: Group 6 - Feature Engineering CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  feature-engineering-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set Up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: 📁 Create Required Folders
        run: |
          mkdir -p input
          mkdir -p output
          mkdir -p tests

      - name: ⚙️ Run Feature Engineering Pipeline
        run: |
          python main.py

      - name: 🧪 Run PyTest Tests
        run: |
          pytest tests/test_functions.py -v --tb=long

      - name: 💾 Commit Output Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add output/
            git commit -m "temp: staging output files [skip ci]" || echo "No changes to commit"
            git pull --rebase origin main
            git add output/
            if ! git diff --staged --quiet; then
              git commit -m "CI: Auto-generated output CSV files - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
              git push origin main
            fi
          else
            git pull --rebase origin main
            git add output/
            if ! git diff --staged --quiet; then
              git commit -m "CI: Auto-generated output CSV files - $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
              git push origin main
            fi
          fi