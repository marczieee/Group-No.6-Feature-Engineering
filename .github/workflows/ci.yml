name: Group 6 - Feature Engineering CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  feature-engineering-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set Up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: 📁 Create Required Folders
        run: |
          mkdir -p input
          mkdir -p output
          mkdir -p tests

      - name: ⚙️ Run Feature Engineering Pipeline
        run: |
          python main.py

      - name: 🧪 Run PyTest Tests
        run: |
          pytest tests/test_functions.py -v --tb=long

      - name: 💾 Force Push Output Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get the absolute latest state of the remote main branch
          git fetch origin main
          git reset --hard origin/main
          
          # Create an undeniable change to force a commit
          echo "Bot run timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > output/.bot_trigger
          
          # Add and commit the entire output folder
          git add output/
          git commit -m "CI: Auto-generated output files - $(date -u +'%Y-%m-%d %H:%M:%S') [skip ci]" || echo "No changes to commit."
          
          # Force push to main. This is safe because the output folder is fully auto-generated.
          git push --force origin main