name: Group 6 - Feature Engineering CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


permissions:
  contents: write

jobs:
  feature-engineering-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set Up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest

      - name: 📁 Create Required Folders
        run: |
          mkdir -p input
          mkdir -p output
          mkdir -p tests

      - name: ⚙️ Run Feature Engineering Pipeline (main.py)
        run: |
          python main.py

      - name: 🧪 Run PyTest Tests
        run: |
          pytest tests/test_functions.py -v --tb=long

      - name: 💾 Commit Output Files to Repository
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # STEP 1: Add all output files first
          echo "📁 Adding output files..."
          git add output/
          
          # STEP 2: Commit the changes (if any)
          if git diff --staged --quiet; then
            echo "✅ No changes to output files."
          else
            echo "📝 Committing changes..."
            git commit -m "CI: Auto-generated output CSV files [skip ci]"
            
            # STEP 3: Now pull with rebase (wala nang unstaged changes)
            echo "🔄 Pulling latest changes from remote..."
            git pull --rebase origin main
            
            # STEP 4: Push the changes
            echo "🚀 Pushing changes to remote..."
            git push origin main
            echo "✅ Successfully pushed changes!"
          fi
